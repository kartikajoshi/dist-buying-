<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DIST Buying" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#006241" />
    <title>DIST Buying</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #006241; }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #006241; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .loader-logo {
            width: 100px; height: 100px; background: white; border-radius: 22px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
        }
        .loader-logo span { font-size: 48px; font-weight: 900; color: #006241; font-family: sans-serif; }
        .loader-text { color: white; font-size: 20px; font-family: sans-serif; font-weight: 600; letter-spacing: 1px; margin-bottom: 32px; }
        .spinner {
            width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-logo"><span>B</span></div>
        <div class="loader-text">DIST Buying</div>
        <div class="spinner"></div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        // Redirect to the actual website after showing splash screen
        setTimeout(function() {
            window.location.href = 'https://etp.benetton.co.in:8089';
        }, 1500);
    </script>
</body>
</html>
